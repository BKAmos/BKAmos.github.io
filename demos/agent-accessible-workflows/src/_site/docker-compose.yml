services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-deseqdemo}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-deseqdemopassword}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: src/Dockerfile.api
    environment:
      API_TOKEN: ${API_TOKEN:-dev-token}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
      DESEQ_DEMO_MODE: ${DESEQ_DEMO_MODE:-false}
      ENABLE_RQ: ${ENABLE_RQ:-false}
      REDIS_URL: redis://redis:6379/0
      RUNS_DIR: /app/runs
      UPLOADS_DIR: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - run-data:/app/runs
      - upload-data:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 20s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ..
      dockerfile: src/Dockerfile.worker
    environment:
      API_TOKEN: ${API_TOKEN:-dev-token}
      REDIS_URL: redis://redis:6379/0
      RUNS_DIR: /app/runs
      UPLOADS_DIR: /app/uploads
    volumes:
      - run-data:/app/runs
      - upload-data:/app/uploads
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
  minio-data:
  run-data:
  upload-data:
