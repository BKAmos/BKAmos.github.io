name: Agent-accessible DESeq workflow

on:
  pull_request:
    paths:
      - "demos/agent-accessible-workflows/**"
      - "portfolio/agent-accessible-workflows.md"
      - "assets/js/deseq-workflow-ui.js"
      - "assets/css/deseq-workflow-ui.css"
      - ".github/workflows/agent-workflow-ci.yml"
  workflow_dispatch:
    inputs:
      deploy_cloudflare:
        description: "Deploy the Cloudflare Worker gateway when secrets are configured"
        required: false
        default: "false"

jobs:
  python-pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demos/agent-accessible-workflows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: demos/agent-accessible-workflows/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint Python demo code
        run: ruff check src data
      - name: Regenerate synthetic dataset
        run: python data/generate.py
      - name: Run local PyDESeq2 pipeline
        run: python src/run.py
      - name: FastAPI smoke test
        env:
          PYTHONPATH: src
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          from api.main import app

          client = TestClient(app)
          health = client.get("/healthz")
          assert health.status_code == 200, health.text
          response = client.post(
              "/tools/run_deseq",
              json={
                  "dataset": "synthetic",
                  "condition_column": "condition",
                  "reference_level": "control",
                  "treatment_level": "treated",
                  "min_count": 10,
              },
          )
          assert response.status_code == 200, response.text
          payload = response.json()
          status = client.get(f"/jobs/{payload['job_id']}")
          assert status.status_code == 200, status.text
          assert status.json()["status"] == "completed"
          PY
      - name: Upload DESeq sample outputs
        uses: actions/upload-artifact@v4
        with:
          name: deseq-sample-outputs
          path: demos/agent-accessible-workflows/outputs/

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build FastAPI image
        uses: docker/build-push-action@v6
        with:
          context: demos/agent-accessible-workflows
          file: demos/agent-accessible-workflows/src/Dockerfile.api
          push: false
          tags: deseq-api:test
      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: demos/agent-accessible-workflows
          file: demos/agent-accessible-workflows/src/Dockerfile.worker
          push: false
          tags: deseq-worker:test

  gateway-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demos/agent-accessible-workflows/src/gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: demos/agent-accessible-workflows/src/gateway/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  cloudflare-deploy:
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_cloudflare == 'true'
    runs-on: ubuntu-latest
    needs: [python-pipeline, gateway-typecheck]
    defaults:
      run:
        working-directory: demos/agent-accessible-workflows/src/gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: demos/agent-accessible-workflows/src/gateway/package-lock.json
      - run: npm ci
      - name: Deploy Cloudflare Worker
        if: env.CLOUDFLARE_API_TOKEN != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
