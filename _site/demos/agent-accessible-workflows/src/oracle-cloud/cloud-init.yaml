#cloud-config
package_update: true
package_upgrade: true
packages:
  - ca-certificates
  - curl
  - git
  - gnupg
  - lsb-release

write_files:
  - path: /opt/deseq-workflow/.env
    permissions: "0600"
    owner: ubuntu:ubuntu
    content: |
      API_TOKEN=change-me-before-public-use
      DESEQ_DEMO_MODE=false
      REDIS_URL=redis://redis:6379/0
      RUNS_DIR=/app/runs
      UPLOADS_DIR=/app/uploads
      MINIO_ROOT_USER=deseq
      MINIO_ROOT_PASSWORD=replace-with-a-long-random-password

runcmd:
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - sh -c 'echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list'
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - usermod -aG docker ubuntu
  - mkdir -p /opt/deseq-workflow
  - chown -R ubuntu:ubuntu /opt/deseq-workflow
  - su - ubuntu -c 'git clone https://github.com/BKAmos/BKAmos.github.io.git /opt/deseq-workflow/repo || true'
  - su - ubuntu -c 'cd /opt/deseq-workflow/repo && git fetch origin cursor/deseq-ui-mcp-workflow-532c && git checkout cursor/deseq-ui-mcp-workflow-532c'
  - su - ubuntu -c 'cp /opt/deseq-workflow/.env /opt/deseq-workflow/repo/demos/agent-accessible-workflows/src/.env'
  - su - ubuntu -c 'cd /opt/deseq-workflow/repo/demos/agent-accessible-workflows/src && docker compose --env-file .env up -d --build'
